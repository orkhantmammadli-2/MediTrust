<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link rel="stylesheet" href="style.css">

    <script src="app.js" defer></script>
</head>

<body>

<div class="login-box">

    <h2>Create Account</h2>

    <input
            type="text"
            id="registerName"
            placeholder="Name">

    <input
            type="email"
            id="registerEmail"
            placeholder="Email">

    <input
            type="password"
            id="registerPassword"
            placeholder="Password">

    <button onclick="register()">
        Register
    </button>

    <div class="auth-links">

        <span>
            Already have an account?
        </span>

        <a href="login.html">
            Login
        </a>

    </div>

</div>

</body>
</html>
